server {
    listen 3000;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri /index.html;
    }

    # Кэширование статичных ассетов
    location ~* \.(js|css|svg|png|jpg|jpeg|gif|ico|woff2?)$ {
        try_files $uri =404;
        expires 30d;
        access_log off;
    }
}