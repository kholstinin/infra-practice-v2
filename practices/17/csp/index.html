<!doctype html>
<html>
  <head>
    <title>CSP Demo</title>
    <meta charset="UTF-8" />

    <style>
      body {
        font-family: sans-serif;
        margin: 40px;
      }
      pre {
        background: #eee;
        padding: 10px;
      }
    </style>
  </head>
  <body>
    <h1>CSP Demo</h1>

    <script nonce="$__NONCE__" src="/script.js"></script>

    <button onclick="alert('inline JS заблокирован CSP')">Inline script</button>

    <button id="fetch-btn">Fetch external</button>

    <script nonce="__NONCE__">
      document.getElementById("fetch-btn").onclick = async () => {
        try {
          await fetch("https://example.com/test");
        } catch (e) {
          console.error("Запрос заблокирован CSP");
        }
      };
    </script>
  </body>
</html>
